version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: rewrite_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rewrite_pass
      MYSQL_DATABASE: rewrite_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
