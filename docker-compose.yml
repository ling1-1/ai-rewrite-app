version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rewrite_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rewrite_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rewrite_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
